<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Sprint 🏃‍♂️💨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        body {
            font-family: 'Jua', sans-serif;
            background-color: #f0f8ff;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 700px;
            text-align: center;
            position: relative;
        }
        h1 { color: #ff6b6b; font-size: 2.5em; margin-bottom: 5px;}
        .screen { display: none; }
        .screen.active { display: block; }
        
        input, select, button, textarea {
            font-family: 'Jua', sans-serif;
            font-size: 1.2em;
            padding: 10px;
            margin: 10px 5px;
            border-radius: 10px;
            border: 2px solid #ddd;
        }
        button {
            background-color: #4ecdc4;
            color: white;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        button.record-btn {
            background-color: #ff6b6b;
            font-size: 1.5em;
            padding: 15px 30px;
            border-radius: 30px;
            margin-top: 20px;
        }
        .teacher-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #95a5a6;
            font-size: 0.8em;
            padding: 5px 10px;
        }
        
        .target-text {
            font-size: 2em;
            color: #2c3e50;
            background-color: #fff9c4;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            border: 2px dashed #ffeb3b;
        }
        .sentence-counter {
            font-size: 1em;
            color: #7f8c8d;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        #timerDisplay { font-size: 1.5em; color: #e74c3c; margin: 10px 0; }
        .feedback { font-size: 1.2em; margin-top: 20px; color: #2980b9; background-color: #f8f9fa; padding: 20px; border-radius: 15px;}
        
        .leaderboard-list {
            list-style: none;
            padding: 0;
            text-align: left;
            max-height: 400px;
            overflow-y: auto;
        }
        .leaderboard-list li {
            background-color: #f1f2f6;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .dashboard-section {
            background-color: #f1f2f6;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: left;
        }
        .unit-list-item {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        .delete-btn {
            background-color: #e74c3c;
            font-size: 0.8em;
            padding: 5px 10px;
        }
        #banner {
            background-color: #ff9f43;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9em;
        }
        .school-badge { 
            display: inline-block; 
            margin-top: 10px; 
            font-size: 0.55em; 
            color: #636e72; 
            font-weight: 500; 
            background-color: #f1f2f6; 
            padding: 6px 20px; 
            border-radius: 25px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            letter-spacing: 1px; 
        }
        .status-table th, .status-table td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }
        .status-table th { background-color: #ffeaa7; }
        
        .footer {
            margin-top: 20px;
            text-align: center;
            color: #95a5a6;
            font-size: 0.9em;
            line-height: 1.5;
        }
        
        .sentence-result-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <button class="teacher-btn" onclick="window.showScreen('teacherLoginScreen')">⚙️ 교사 설정</button>
    <div id="banner">오프라인(로컬) 모드로 실행 중입니다. 데이터는 현재 브라우저에만 저장됩니다.</div>

    <div id="loginScreen" class="screen active">
        <h1 id="mainAppTitle">Reading Sprint 🏃‍♂️💨</h1>
        <div style="display: flex; flex-wrap: wrap; justify-content: center; margin-top: 20px;">
            <select id="grade">
                <option value="">학년</option>
                <option value="3">3학년</option>
                <option value="4">4학년</option>
                <option value="5">5학년</option>
                <option value="6">6학년</option>
            </select>
            <select id="classNum">
                <option value="">반</option>
                <option value="1">1반</option>
                <option value="2">2반</option>
                <option value="3">3반</option>
                <option value="4">4반</option>
                <option value="5">5반</option>
                <option value="6">6반</option>
                <option value="7">7반</option>
                <option value="8">8반</option>
                <option value="9">9반</option>
                <option value="10">10반</option>
            </select>
            <input type="number" id="studentNum" placeholder="번호" style="width: 80px;">
            <input type="text" id="studentName" placeholder="이름" style="width: 120px;">
        </div>
        <button onclick="window.login()" style="margin-top: 20px; font-size: 1.3em; padding: 10px 40px;">입장하기</button>
        <br>
        <button onclick="window.showLeaderboard()" style="margin-top: 15px; background-color: #feca57; font-size: 1.1em; padding: 10px 30px;">🏆 명예의 전당 보기</button>
    </div>

    <div id="lobbyScreen" class="screen">
        <h1 id="welcomeMsg" style="font-size: 2em;">환영합니다!</h1>
        <h2 style="color: #636e72;">학습할 단원을 선택하세요</h2>
        <select id="unitSelect" style="width: 80%; max-width: 400px;"></select>
        <br><br>
        <button onclick="window.startPractice(0)" style="font-size: 1.3em; padding: 15px 30px;">🚀 연습 시작하기</button>
        <button onclick="window.showLeaderboard()" style="background-color: #feca57; font-size: 1.3em; padding: 15px 30px;">🏆 명예의 전당</button>
    </div>

    <div id="practiceScreen" class="screen">
        <h2 id="currentUnitTitle" style="color: #6c5ce7; font-size: 1.8em; margin-bottom: 5px;">Unit 1</h2>
        <div class="sentence-counter" id="sentenceCounter">문장 1 / 3</div>
        <div class="target-text" id="targetSentence">Loading...</div>
        <button onclick="window.playTTS()" style="background-color: #3498db; font-size: 1em; padding: 10px 20px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">🔊 원어민 발음 듣기</button>
        <div id="timerDisplay">준비!</div>
        <button id="recordBtn" class="record-btn" onclick="window.toggleRecording()">🎙️ 마이크 켜기</button>
        <div class="feedback" id="feedbackArea"></div>
        <div id="practiceNavButtons" style="display: none; margin-top: 20px;"></div>
    </div>

    <div id="resultScreen" class="screen">
        <h1>🎉 단원 연습 완료!</h1>
        <h2 id="finalResultUnitTitle" style="color: #6c5ce7; font-size: 2em;">Unit 1</h2>
        <div style="background: #ffeaa7; padding: 20px; border-radius: 20px; margin: 10px 0 20px 0; display: inline-block; width: 80%;">
            <div style="font-size: 1.2em; color: #555; margin-bottom: 5px;">이번 단원 총 획득 포인트</div>
            <div style="font-size: 3em; color: #e67e22; font-weight: bold;"><span id="finalScoreDisplay">0</span><span style="font-size: 0.5em; color: #333;"> 점</span></div>
        </div>
        <div id="sentenceResultsList" style="width: 100%; max-width: 500px; margin: 0 auto 20px auto; max-height: 300px; overflow-y: auto; padding-right: 10px;"></div>
        <br>
        <button onclick="window.showLeaderboard()" style="background-color: #feca57; font-size: 1.2em; padding: 10px 20px;">🏆 명예의 전당 보기</button>
        <button onclick="window.showScreen('lobbyScreen')" style="font-size: 1.2em; padding: 10px 20px; margin-left: 10px;">🏠 메인으로</button>
    </div>

    <div id="leaderboardScreen" class="screen">
        <h1>🏆 명예의 전당 🏆</h1>
        <div style="margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; align-items: center;">
            <select id="leaderboardUnitSelect" onchange="window.loadLeaderboardData()" style="width: 80%; max-width: 400px;"></select>
            <div style="display: flex; gap: 10px; justify-content: center; width: 100%;">
                <select id="leaderboardGradeSelect" onchange="window.loadLeaderboardData()" style="flex: 1; max-width: 150px;">
                    <option value="ALL">전체 학년</option>
                    <option value="3">3학년</option>
                    <option value="4">4학년</option>
                    <option value="5">5학년</option>
                    <option value="6">6학년</option>
                </select>
                <select id="leaderboardClassSelect" onchange="window.loadLeaderboardData()" style="flex: 1; max-width: 150px;">
                    <option value="ALL">전체 반</option>
                    <option value="1">1반</option>
                    <option value="2">2반</option>
                    <option value="3">3반</option>
                    <option value="4">4반</option>
                    <option value="5">5반</option>
                    <option value="6">6반</option>
                    <option value="7">7반</option>
                    <option value="8">8반</option>
                    <option value="9">9반</option>
                    <option value="10">10반</option>
                </select>
            </div>
        </div>
        <ul class="leaderboard-list" id="leaderboardList"></ul>
        <button onclick="window.goBackFromLeaderboard()" style="margin-top: 20px;">🏠 돌아가기</button>
    </div>

    <div id="teacherLoginScreen" class="screen">
        <h1>⚙️ 교사 설정 모드</h1>
        <input type="password" id="teacherPw" placeholder="비밀번호" onkeypress="if(event.key === 'Enter') window.teacherLogin()">
        <br>
        <button onclick="window.teacherLogin()">확인</button>
        <button onclick="window.showScreen('loginScreen')" style="background-color: #95a5a6;">취소</button>
    </div>

    <div id="teacherDashboardScreen" class="screen">
        <h1>👨‍🏫 관리 대시보드</h1>
        <div class="dashboard-section">
            <h3>📝 단원 및 문장 관리</h3>
            <div id="teacherUnitList" style="margin-bottom: 25px; max-height: 400px; overflow-y: auto;"></div>
            <div style="background-color: white; padding: 20px; border-radius: 10px; border: 2px dashed #0984e3;">
                <input type="text" id="newUnitName" placeholder="단원명 직접 입력 또는 선택" list="existingUnitsList" style="width: 100%; box-sizing: border-box;">
                <datalist id="existingUnitsList"></datalist>
                <textarea id="newUnitText" placeholder="읽기 문장 입력" style="width: 100%; height: 100px;"></textarea>
                <button onclick="window.addUnitSentence()" style="background-color: #2ecc71; width: 100%;">+ 추가 및 자동 저장</button>
            </div>
        </div>
        <button onclick="window.showScreen('loginScreen')" style="background-color: #e74c3c; width: 100%;">로그아웃</button>
    </div>
</div>

<div class="footer">만든이: 곽현석(이의초등학교)</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, getDocs, setDoc, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // (기존 코드 생략...)
    // 수정된 핵심 로직: calculateAndShowResult 함수

    window.calculateAndShowResult = function(target, recognized, timeTaken) {
        // 문장 부호 제거 및 소문자 통일 (정규식: [^a-zA-Z0-9\s]는 영문/숫자/공백 외 모든 문자 제거)
        const cleanTarget = target.toLowerCase().replace(/[^a-z0-9\s]/g, "").trim();
        const cleanRecognized = recognized.toLowerCase().replace(/[^a-z0-9\s]/g, "").trim();

        // Levenshtein 알고리즘을 통한 정확도 계산 (동일 로직)
        const distance = getLevenshteinDistance(cleanTarget, cleanRecognized);
        const maxLength = Math.max(cleanTarget.length, cleanRecognized.length);
        
        let accuracy = maxLength === 0 ? 100 : Math.max(0, Math.round(((maxLength - distance) / maxLength) * 100));

        // 결과 반영 및 UI 출력 로직 (동일)
        // ...
    };

    function getLevenshteinDistance(a, b) {
        const matrix = [];
        for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
        for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
        for (let i = 1; i <= b.length; i++) {
            for (let j = 1; j <= a.length; j++) {
                if (b.charAt(i - 1) == a.charAt(j - 1)) {
                    matrix[i][j] = matrix[i - 1][j - 1];
                } else {
                    matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
                }
            }
        }
        return matrix[b.length][a.length];
    }

</body>
</html>
