<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Sprint 🏃‍♂️💨</title>
    <!-- 폰트 적용: 트렌디한 팝스(Poppins)와 프리텐다드 -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #ff0844;
            --accent2: #ffb199;
            --bg-dark: #0f172a;
            --panel-bg: rgba(255, 255, 255, 0.1);
            --text-light: #f8fafc;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Pretendard', 'Poppins', sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 15% 50%, rgba(79, 172, 254, 0.15), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(255, 8, 68, 0.15), transparent 25%);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glassmorphism Panel */
        .container {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 40px;
            width: 100%;
            max-width: 800px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        h1.title-logo {
            font-family: 'Poppins', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 30px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0px 4px 20px rgba(0, 242, 254, 0.3);
        }

        h2 { font-size: 1.8rem; margin-bottom: 20px; font-weight: 600; }

        .screen { display: none; animation: fadeIn 0.4s ease-out; }
        .screen.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Inputs & Selects */
        input, select {
            font-family: 'Pretendard', sans-serif;
            font-size: 1.1rem;
            padding: 12px 20px;
            margin: 10px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.2);
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }
        input::placeholder { color: #aaa; }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 242, 254, 0.5); }
        select option { background: var(--bg-dark); color: white; }

        /* Buttons */
        button {
            font-family: 'Pretendard', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 14px 28px;
            margin: 10px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(118, 75, 162, 0.5); }
        button:active { transform: translateY(1px); }

        .btn-glow { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); }
        .btn-glow:hover { box-shadow: 0 8px 25px rgba(0, 242, 254, 0.5); }
        
        .btn-danger { background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%); }
        .btn-danger:hover { box-shadow: 0 8px 25px rgba(255, 8, 68, 0.5); }

        .btn-outline { background: transparent; border: 2px solid rgba(255,255,255,0.5); }
        .btn-outline:hover { background: rgba(255,255,255,0.1); }

        /* Practice Screen Elements */
        .target-text {
            font-size: 2.5rem;
            font-weight: 800;
            color: #fff;
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 20px;
            margin: 30px 0;
            border-left: 5px solid var(--primary);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            word-wrap: break-word;
        }

        #timerDisplay { font-family: 'Poppins', sans-serif; font-size: 2rem; color: var(--accent2); margin: 15px 0; font-weight: bold; }
        .feedback { font-size: 1.3rem; margin-top: 20px; padding: 20px; border-radius: 15px; background: rgba(0,0,0,0.4); display: none; }
        
        /* Record Button Animation */
        .record-btn {
            font-size: 1.5rem; padding: 20px 40px; border-radius: 50px; margin-top: 10px;
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
            box-shadow: 0 0 20px rgba(255, 8, 68, 0.4);
        }
        .recording {
            animation: pulse 1.5s infinite;
            background: linear-gradient(135deg, #f83600 0%, #f9d423 100%);
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 8, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(255, 8, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 8, 68, 0); }
        }

        /* Teacher Dashboard */
        .dashboard-grid {
            display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px;
        }
        .dashboard-card {
            background: rgba(0,0,0,0.2); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: left;
        }
        .unit-item {
            display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05);
            padding: 10px 15px; margin-bottom: 10px; border-radius: 10px;
        }
        .unit-item button { padding: 5px 10px; font-size: 0.9rem; margin: 0; }

        /* Leaderboard */
        .leaderboard-list { list-style: none; padding: 0; }
        .leaderboard-list li {
            background: rgba(255,255,255,0.1); margin-bottom: 10px; padding: 15px 20px;
            border-radius: 12px; display: flex; justify-content: space-between; font-weight: bold;
            border-left: 4px solid var(--secondary);
        }
        .rank-1 { background: linear-gradient(90deg, rgba(255,215,0,0.2), transparent) !important; border-left-color: gold !important; }
        .rank-2 { background: linear-gradient(90deg, rgba(192,192,192,0.2), transparent) !important; border-left-color: silver !important; }
        .rank-3 { background: linear-gradient(90deg, rgba(205,127,50,0.2), transparent) !important; border-left-color: #cd7f32 !important; }

        .flex-row { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="title-logo" id="mainAppTitle">Reading Sprint</h1>

    <!-- 화면 0: 모드 선택 (학생/교사) -->
    <div id="roleScreen" class="screen active">
        <h2>어떤 모드로 접속할까요?</h2>
        <div class="flex-row" style="margin-top: 40px;">
            <button class="btn-glow" onclick="showScreen('studentLoginScreen')" style="padding: 20px 40px; font-size: 1.5rem;">👨‍🎓 학생 입장</button>
            <button class="btn-outline" onclick="showScreen('teacherLoginScreen')">👩‍🏫 교사 모드</button>
        </div>
    </div>

    <!-- 화면 1: 학생 로그인 -->
    <div id="studentLoginScreen" class="screen">
        <h2>내 정보 입력</h2>
        <div class="flex-row">
            <select id="grade"><option value="">학년</option><option value="3">3학년</option><option value="4">4학년</option><option value="5">5학년</option><option value="6">6학년</option></select>
            <select id="classNum">
                <option value="">반</option>
                <option value="1">1반</option>
                <option value="2">2반</option>
                <option value="3">3반</option>
                <option value="4">4반</option>
                <option value="5">5반</option>
                <option value="6">6반</option>
                <option value="7">7반</option>
                <option value="8">8반</option>
                <option value="9">9반</option>
                <option value="10">10반</option>
            </select>
            <input type="number" id="studentNum" placeholder="번호" style="width: 100px;">
        </div>
        <div class="flex-row">
            <input type="text" id="studentName" placeholder="이름을 입력하세요" style="width: 250px;">
        </div>
        <div class="flex-row" style="margin-top: 20px;">
            <button class="btn-outline" onclick="showScreen('roleScreen')">뒤로</button>
            <button class="btn-glow" onclick="studentLogin()">입장하기 🚀</button>
        </div>
    </div>

    <!-- 화면 1-2: 교사 로그인 -->
    <div id="teacherLoginScreen" class="screen">
        <h2>교사 인증</h2>
        <p style="color: #aaa; font-size: 0.9em;" id="pwHint">(초기 비밀번호: admin)</p>
        <input type="password" id="teacherPw" placeholder="비밀번호" style="width: 250px;" onkeypress="if(event.key==='Enter') window.teacherLogin()">
        <div class="flex-row" style="margin-top: 20px;">
            <button class="btn-outline" onclick="showScreen('roleScreen')">뒤로</button>
            <button class="btn-glow" onclick="teacherLogin()">관리자 로그인</button>
        </div>
    </div>

    <!-- 화면 2: 교사 대시보드 (설정) -->
    <div id="teacherDashboardScreen" class="screen">
        <h2>⚙️ 교사 관리 대시보드</h2>
        
        <div class="dashboard-grid">
            <!-- 앱 설정 섹션 -->
            <div class="dashboard-card" style="border-color: var(--primary); background: rgba(0, 242, 254, 0.05);">
                <h3 style="color: var(--primary);">기본 설정 (학교명 / 비밀번호)</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;">
                    <input type="text" id="settingSchoolName" placeholder="학교명 (예: 행복초등)" style="flex: 1; min-width: 150px;">
                    <input type="text" id="settingTeacherPw" placeholder="새 비밀번호" style="flex: 1; min-width: 150px;">
                </div>
                <button class="btn-glow" onclick="saveSettings()" style="width: 100%; padding: 10px; margin: 0;">💾 설정 저장</button>
            </div>

            <!-- 단원 추가 섹션 -->
            <div class="dashboard-card">
                <h3>새로운 단원 만들기</h3>
                <input type="text" id="newUnitName" placeholder="예: Unit 1. Hello" style="width: 100%; box-sizing: border-box;">
                <textarea id="newUnitText" placeholder="학생들이 읽을 영어 문장을 입력하세요." rows="3" style="width: 100%; margin: 10px 0; padding: 10px; border-radius: 10px; background: rgba(0,0,0,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); font-family: 'Pretendard'; resize: vertical;"></textarea>
                <button class="btn-glow" onclick="addUnit()" style="width: 100%;">+ 단원 추가하기</button>
            </div>

            <!-- 단원 관리 섹션 -->
            <div class="dashboard-card">
                <h3>등록된 단원 관리</h3>
                <div id="unitListArea">
                    <!-- 단원 리스트가 여기에 렌더링됨 -->
                </div>
            </div>
        </div>

        <button class="btn-outline" style="margin-top: 30px;" onclick="logout()">처음 화면으로 로그아웃</button>
    </div>

    <!-- 화면 3: 학생 로비 -->
    <div id="lobbyScreen" class="screen">
        <h2 id="welcomeMsg" style="color: var(--primary);">환영합니다!</h2>
        <div class="dashboard-card" style="text-align: center;">
            <h3>도전할 단원을 선택하세요</h3>
            <select id="studentUnitSelect" style="width: 80%; font-size: 1.2rem;"></select>
            <br>
            <button class="btn-glow" onclick="startPractice()" style="font-size: 1.5rem; padding: 15px 40px; margin-top: 20px;">GO SPRINT! 🏁</button>
        </div>
        
        <div class="flex-row" style="margin-top: 20px;">
            <button onclick="showLeaderboard()" style="background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); color: #333;">🏆 명예의 전당</button>
            <button class="btn-outline" onclick="logout()">처음으로 (로그아웃)</button>
        </div>
    </div>

    <!-- 화면 4: 읽기 연습 방 -->
    <div id="practiceScreen" class="screen">
        <h2 id="currentUnitTitle" style="color: var(--secondary);">Unit 1</h2>
        <div class="target-text" id="targetSentence">Loading...</div>
        <div id="timerDisplay">0.0 초</div>
        
        <button id="recordBtn" class="record-btn" onclick="toggleRecording()">🎙️ Start Reading!</button>
        
        <div class="feedback" id="feedbackArea">
            <!-- 결과가 여기에 표시됨 -->
        </div>
        
        <!-- 완료 후 메인 메뉴로 돌아가기 버튼 -->
        <div id="practiceNavButtons" style="display: none; margin-top:30px;">
            <button class="btn-glow" onclick="startPractice()">🔄 다시 도전하기</button>
            <button class="btn-outline" onclick="showScreen('lobbyScreen')">🏠 로비로 돌아가기</button>
        </div>
    </div>

    <!-- 화면 5: 명예의 전당 -->
    <div id="leaderboardScreen" class="screen">
        <h2>🏆 명예의 전당</h2>
        <select id="leaderboardUnitSelect" onchange="loadLeaderboard()" style="width: 60%;"></select>
        
        <ul class="leaderboard-list" id="leaderboardList" style="margin-top: 20px;">
            <!-- 랭킹 데이터 -->
        </ul>
        <button class="btn-outline" onclick="showScreen('lobbyScreen')" style="margin-top: 20px;">🏠 로비로 돌아가기</button>
    </div>
</div>

<!-- Firebase를 위한 모듈 타입 스크립트로 변경 -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, addDoc, query, where, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 사용자 제공 Firebase 설정
    const firebaseConfig = {
      apiKey: "AIzaSyDRDLloeG2GCuGvPlAjeC5QW5xVcmjce8I",
      authDomain: "reading-add85.firebaseapp.com",
      projectId: "reading-add85",
      storageBucket: "reading-add85.firebasestorage.app",
      messagingSenderId: "377081797792",
      appId: "1:377081797792:web:3efc7ce049df6955213dc5",
      measurementId: "G-EY079V9WDL"
    };

    // Firebase 앱 및 DB 초기화
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentUser = {};
    let isRecording = false;
    let recognition;
    let startTime;
    let timerInterval;
    let loadedUnits = {}; // DB에서 불러온 단어장 캐시
    let useLocalMock = false; // Firestore 연결 실패 시 로컬 모드로 전환
    let mockScores = []; // 로컬 모드용 점수 저장 배열

    // 전역 설정 변수
    let globalSchoolName = localStorage.getItem("rs_schoolName") || "";
    let globalTeacherPw = localStorage.getItem("rs_teacherPw") || "admin";

    // 학교명 및 초기 설정 화면 반영 함수
    function applyGlobalSettings() {
        const titleEl = document.getElementById('mainAppTitle');
        if(titleEl) {
            titleEl.innerText = globalSchoolName ? `${globalSchoolName} Reading Sprint` : "Reading Sprint";
        }
        document.title = globalSchoolName ? `${globalSchoolName} Reading Sprint` : "Reading Sprint 🏃‍♂️💨";
        
        const settingNameEl = document.getElementById('settingSchoolName');
        const settingPwEl = document.getElementById('settingTeacherPw');
        if(settingNameEl) settingNameEl.value = globalSchoolName;
        if(settingPwEl) settingPwEl.value = globalTeacherPw;
    }

    // --- Firebase DB 연동: 단원 불러오기 ---
    async function fetchUnitsFromDB() {
        applyGlobalSettings();
        try {
            const querySnapshot = await getDocs(collection(db, "units"));
            loadedUnits = {};
            querySnapshot.forEach((doc) => {
                loadedUnits[doc.id] = doc.data().text;
            });
            
            // 만약 DB가 비어있다면 초기 샘플 데이터 세팅
            if(Object.keys(loadedUnits).length === 0) {
                const defaultUnits = {
                    "Unit 1. Hello": "Hello nice to meet you.",
                    "Unit 2. My Favorite Food": "My favorite food is delicious pizza."
                };
                for (const [name, text] of Object.entries(defaultUnits)) {
                    await setDoc(doc(db, "units", name), { text: text });
                    loadedUnits[name] = text;
                }
            }

            // 설정 데이터 불러오기
            try {
                const settingsDoc = await getDocs(collection(db, "settings"));
                settingsDoc.forEach((docItem) => {
                    if(docItem.id === "global") {
                        const data = docItem.data();
                        if(data.schoolName !== undefined) globalSchoolName = data.schoolName;
                        if(data.teacherPw !== undefined) globalTeacherPw = data.teacherPw;
                        localStorage.setItem("rs_schoolName", globalSchoolName);
                        localStorage.setItem("rs_teacherPw", globalTeacherPw);
                        applyGlobalSettings();
                    }
                });
            } catch (e) {
                console.warn("설정 문서 가져오기 실패", e);
            }

        } catch (error) {
            console.warn("Firestore 연결 실패. 로컬 메모리 모드로 전환합니다:", error);
            useLocalMock = true; // DB 대신 브라우저 메모리 사용
            loadedUnits = JSON.parse(localStorage.getItem('rs_localUnits')) || {
                "Unit 1. Hello": "Hello nice to meet you.",
                "Unit 2. My Favorite Food": "My favorite food is delicious pizza."
            };
        } finally {
            window.refreshUnitSelects();
        }
    }

    // type="module" 안의 함수를 HTML의 onclick에서 쓸 수 있도록 window 객체에 바인딩
    window.showScreen = function(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        
        if(screenId === 'lobbyScreen') {
            window.refreshUnitSelects();
        }
    };

    window.logout = function() {
        currentUser = {};
        window.showScreen('roleScreen');
    };

    window.refreshUnitSelects = function() {
        const studentSelect = document.getElementById('studentUnitSelect');
        const lbSelect = document.getElementById('leaderboardUnitSelect');
        
        studentSelect.innerHTML = '';
        lbSelect.innerHTML = '';
        
        for (const unitName of Object.keys(loadedUnits)) {
            studentSelect.innerHTML += `<option value="${unitName}">${unitName}</option>`;
            lbSelect.innerHTML += `<option value="${unitName}">${unitName}</option>`;
        }
    };

    window.teacherLogin = function() {
        const pw = document.getElementById('teacherPw').value;
        if(pw === globalTeacherPw) { 
            document.getElementById('teacherPw').value = '';
            window.showScreen('teacherDashboardScreen');
            window.renderTeacherUnitList();
        } else {
            alert('비밀번호가 틀렸습니다.');
        }
    };

    window.saveSettings = async function() {
        const newName = document.getElementById('settingSchoolName').value.trim();
        const newPw = document.getElementById('settingTeacherPw').value.trim();
        
        if(!newPw) {
            alert('비밀번호는 비워둘 수 없습니다!');
            return;
        }

        globalSchoolName = newName;
        globalTeacherPw = newPw;
        localStorage.setItem("rs_schoolName", globalSchoolName);
        localStorage.setItem("rs_teacherPw", globalTeacherPw);
        
        applyGlobalSettings();

        try {
            if(!useLocalMock) {
                await setDoc(doc(db, "settings", "global"), { 
                    schoolName: globalSchoolName, 
                    teacherPw: globalTeacherPw 
                });
            }
            alert('설정이 성공적으로 저장되었습니다!');
        } catch(e) {
            console.error("설정 저장 오류", e);
            alert('로컬에 설정이 저장되었습니다. (DB 연결 안됨)');
        }
    };

    window.addUnit = async function() {
        const name = document.getElementById('newUnitName').value.trim();
        const text = document.getElementById('newUnitText').value.trim();
        
        if(!name || !text) {
            alert('단원 이름과 문장을 모두 입력해주세요!');
            return;
        }

        try {
            if(useLocalMock) {
                loadedUnits[name] = text;
                localStorage.setItem('rs_localUnits', JSON.stringify(loadedUnits));
            } else {
                await setDoc(doc(db, "units", name), { text: text });
                loadedUnits[name] = text;
            }
            
            document.getElementById('newUnitName').value = '';
            document.getElementById('newUnitText').value = '';
            window.renderTeacherUnitList();
            window.refreshUnitSelects();
            alert('성공적으로 등록되었습니다!');
        } catch (e) {
            console.error("단원 추가 에러:", e);
            alert('단원 추가 중 오류가 발생했습니다.');
        }
    };

    window.deleteUnit = async function(unitName) {
        if(confirm(`'${unitName}' 단원을 삭제하시겠습니까?`)) {
            try {
                if(useLocalMock) {
                    delete loadedUnits[unitName];
                    localStorage.setItem('rs_localUnits', JSON.stringify(loadedUnits));
                } else {
                    await deleteDoc(doc(db, "units", unitName));
                    delete loadedUnits[unitName];
                }
                window.renderTeacherUnitList();
                window.refreshUnitSelects();
            } catch (e) {
                console.error("단원 삭제 에러:", e);
                alert('단원 삭제 중 오류가 발생했습니다.');
            }
        }
    };

    window.renderTeacherUnitList = function() {
        const listArea = document.getElementById('unitListArea');
        listArea.innerHTML = '';
        
        if(Object.keys(loadedUnits).length === 0) {
            listArea.innerHTML = '<p style="color:#aaa;">등록된 단원이 없습니다.</p>';
            return;
        }

        for (const [name, text] of Object.entries(loadedUnits)) {
            const div = document.createElement('div');
            div.className = 'unit-item';
            div.innerHTML = `
                <div style="flex:1; padding-right:10px;">
                    <strong>${name}</strong><br>
                    <span style="font-size:0.85rem; color:#ccc;">${text}</span>
                </div>
                <button class="btn-danger" onclick="deleteUnit('${name}')">삭제</button>
            `;
            listArea.appendChild(div);
        }
    };

    window.studentLogin = function() {
        const grade = document.getElementById('grade').value;
        const classNum = document.getElementById('classNum').value;
        const studentNum = document.getElementById('studentNum').value;
        const studentName = document.getElementById('studentName').value;

        if(!grade || !classNum || !studentNum || !studentName) {
            alert('정보를 모두 입력해주세요!');
            return;
        }

        currentUser = { grade, classNum, studentNum, studentName };
        document.getElementById('welcomeMsg').innerText = `${grade}학년 ${classNum}반 ${studentName} 선수, 준비 완료!`;
        window.showScreen('lobbyScreen');
    };

    window.startPractice = function() {
        const unitName = document.getElementById('studentUnitSelect').value;
        if(!unitName) { alert('단원을 선택해주세요!'); return; }

        document.getElementById('currentUnitTitle').innerText = unitName;
        document.getElementById('targetSentence').innerText = loadedUnits[unitName];
        
        document.getElementById('feedbackArea').style.display = 'none';
        document.getElementById('feedbackArea').innerHTML = '';
        document.getElementById('practiceNavButtons').style.display = 'none';
        document.getElementById('timerDisplay').innerText = '0.0 초';
        
        const btn = document.getElementById('recordBtn');
        btn.style.display = 'inline-block';
        btn.innerText = '🎙️ Start Reading!';
        btn.classList.remove('recording');
        
        window.showScreen('practiceScreen');
    };

    function initSpeechRecognition() {
        window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!window.SpeechRecognition) {
            alert("음성 인식이 지원되지 않는 브라우저입니다. Chrome을 사용해주세요.");
            return null;
        }
        const rc = new SpeechRecognition();
        rc.lang = 'en-US';
        rc.interimResults = false;
        rc.maxAlternatives = 1;
        return rc;
    }

    window.toggleRecording = function() {
        if(isRecording) return; 
        
        recognition = initSpeechRecognition();
        if(!recognition) return;

        const targetText = document.getElementById('targetSentence').innerText;
        const unitName = document.getElementById('studentUnitSelect').value;
        const btn = document.getElementById('recordBtn');

        recognition.onstart = function() {
            isRecording = true;
            btn.innerText = "Listening... 👀";
            btn.classList.add('recording');
            
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                document.getElementById('timerDisplay').innerText = `${elapsed} 초`;
            }, 100);
        };

        recognition.onspeechend = function() {
            recognition.stop();
        };

        recognition.onresult = function(event) {
            clearInterval(timerInterval);
            isRecording = false;
            btn.style.display = 'none'; 

            const recognizedText = event.results[0][0].transcript;
            const timeTaken = (Date.now() - startTime) / 1000;
            
            calculateAndShowResult(targetText, recognizedText, timeTaken, unitName);
        };

        recognition.onerror = function(event) {
            clearInterval(timerInterval);
            isRecording = false;
            btn.innerText = "🎙️ Error! Try Again";
            btn.classList.remove('recording');
            // 에러가 나더라도 사용자가 계속 시도할 수 있도록 처리
            console.error("Speech Recognition Error:", event.error);
        };

        recognition.start();
    };

    function getLevenshteinDistance(a, b) {
        const matrix = [];
        for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
        for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
        for (let i = 1; i <= b.length; i++) {
            for (let j = 1; j <= a.length; j++) {
                if (b.charAt(i - 1) == a.charAt(j - 1)) {
                    matrix[i][j] = matrix[i - 1][j - 1];
                } else {
                    matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
                }
            }
        }
        return matrix[b.length][a.length];
    }

    async function calculateAndShowResult(target, recognized, timeTaken, unitName) {
        const cleanTarget = target.toLowerCase().replace(/[.,!?]/g, "");
        const cleanRecognized = recognized.toLowerCase().replace(/[.,!?]/g, "");

        const distance = getLevenshteinDistance(cleanTarget, cleanRecognized);
        const maxLength = Math.max(cleanTarget.length, cleanRecognized.length);
        
        let accuracy = ((maxLength - distance) / maxLength) * 100;
        accuracy = Math.max(0, Math.round(accuracy));

        const wordCount = cleanTarget.split(" ").length;
        const targetTime = wordCount * 0.9; 

        const feedbackBox = document.getElementById('feedbackArea');
        feedbackBox.style.display = 'block';
        
        let feedbackHTML = `<div style="margin-bottom:10px; font-size:1.1rem; color:#ccc;">내가 읽은 문장: <i>"${recognized}"</i></div>`;

        if(accuracy < 80) {
            feedbackHTML += `
                <div style="color: var(--accent); font-weight:bold; font-size:1.5rem;">정확도: ${accuracy}% 😭</div>
                <p>아쉽네요! 발음에 조금 더 신경 써서 다시 스프린트 해보세요!</p>
            `;
        } else {
            let baseScore = accuracy; 
            let speedBonus = 0;
            
            if(timeTaken < targetTime) {
                speedBonus = Math.round((targetTime - timeTaken) * 10); 
            }
            
            const finalScore = baseScore + speedBonus;
            
            feedbackHTML += `
                <div style="color: #00e676; font-weight:bold; font-size:1.6rem;">정확도: ${accuracy}% 🎉 Excellent!</div>
                <div style="margin: 10px 0; font-size: 1.1rem;">
                    ⏱ 소요 시간: <b>${timeTaken.toFixed(1)}초</b> (목표: ${targetTime.toFixed(1)}초)<br>
                    ✨ 기본 ${baseScore}점 + 스피드 보너스 ${speedBonus}점
                </div>
                <div style="font-size: 2rem; color: #ffeb3b; font-weight: 800; text-shadow: 0 0 10px rgba(255,235,59,0.5);">
                    총 획득 포인트: ${finalScore}점!
                </div>
                <div id="saveStatus" style="font-size:0.9rem; color:#aaa; margin-top:10px;">기록 저장 중...☁️</div>
            `;
            
            // Firebase에 점수 저장
            saveScoreToDB(unitName, finalScore, timeTaken, accuracy);
        }

        feedbackBox.innerHTML = feedbackHTML;
        document.getElementById('practiceNavButtons').style.display = 'block';
    }

    async function saveScoreToDB(unit, score, timeTaken, accuracy) {
        try {
            const scoreData = {
                unit: unit,
                grade: currentUser.grade,
                classNum: currentUser.classNum,
                studentNum: currentUser.studentNum,
                name: currentUser.studentName,
                score: score,
                accuracy: accuracy,
                time: timeTaken,
                timestamp: useLocalMock ? Date.now() : serverTimestamp()
            };

            if(useLocalMock) {
                mockScores.push(scoreData);
            } else {
                await addDoc(collection(db, "scores"), scoreData);
            }
            document.getElementById('saveStatus').innerText = "✅ 기록이 저장되었습니다!";
        } catch (e) {
            console.error("점수 저장 에러:", e);
            document.getElementById('saveStatus').innerText = "❌ 저장 실패 (Firebase 권한 문제일 수 있습니다)";
        }
    }

    window.showLeaderboard = function() {
        window.showScreen('leaderboardScreen');
        // 기본으로 현재 선택된 단원 리더보드 로드
        const unitName = document.getElementById('studentUnitSelect').value;
        if(unitName) {
            document.getElementById('leaderboardUnitSelect').value = unitName;
            window.loadLeaderboard();
        }
    };

    window.loadLeaderboard = async function() {
        const unitName = document.getElementById('leaderboardUnitSelect').value;
        const listArea = document.getElementById('leaderboardList');
        
        listArea.innerHTML = '<li style="justify-content:center;">데이터를 불러오는 중... 🏃‍♂️☁️</li>';
        
        try {
            listArea.innerHTML = '';
            let rank = 1;

            if(useLocalMock) {
                // 로컬 배열에서 정렬 후 상위 10개 추출
                const filteredScores = mockScores
                    .filter(s => s.unit === unitName)
                    .sort((a, b) => b.score - a.score)
                    .slice(0, 10);
                
                if(filteredScores.length === 0) {
                    listArea.innerHTML = '<li style="justify-content:center;">아직 기록이 없습니다. 첫 기록의 주인공이 되어보세요!</li>';
                    return;
                }

                filteredScores.forEach(data => {
                    let rankClass = rank === 1 ? 'rank-1' : (rank === 2 ? 'rank-2' : (rank === 3 ? 'rank-3' : ''));
                    let medal = rank === 1 ? '🥇' : (rank === 2 ? '🥈' : (rank === 3 ? '🥉' : ''));

                    listArea.innerHTML += `
                        <li class="${rankClass}">
                            <span>${medal} ${rank}위 - ${data.grade}학년 ${data.classNum}반 ${data.name}</span> 
                            <span>${data.score}점</span>
                        </li>
                    `;
                    rank++;
                });
            } else {
                // Firestore 쿼리
                const q = query(
                    collection(db, "scores"), 
                    where("unit", "==", unitName), 
                    orderBy("score", "desc"), 
                    limit(10)
                );
                
                const querySnapshot = await getDocs(q);
                
                if(querySnapshot.empty) {
                    listArea.innerHTML = '<li style="justify-content:center;">아직 기록이 없습니다. 첫 기록의 주인공이 되어보세요!</li>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    let rankClass = rank === 1 ? 'rank-1' : (rank === 2 ? 'rank-2' : (rank === 3 ? 'rank-3' : ''));
                    let medal = rank === 1 ? '🥇' : (rank === 2 ? '🥈' : (rank === 3 ? '🥉' : ''));

                    listArea.innerHTML += `
                        <li class="${rankClass}">
                            <span>${medal} ${rank}위 - ${data.grade}학년 ${data.classNum}반 ${data.name}</span> 
                            <span>${data.score}점</span>
                        </li>
                    `;
                    rank++;
                });
            }
        } catch (e) {
            console.error("리더보드 로드 에러:", e);
            listArea.innerHTML = '<li style="justify-content:center; color:red;">랭킹을 불러오지 못했습니다. DB 연결을 확인하세요.</li>';
        }
    };

    // 앱 시작 시 데이터 로드
    fetchUnitsFromDB();

</script>
