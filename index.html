    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        body {
            font-family: 'Jua', sans-serif;
            background-color: #f0f8ff;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h1 { color: #ff6b6b; font-size: 2.5em; }
        .screen { display: none; }
        .screen.active { display: block; }
        
        input, select, button {
            font-family: 'Jua', sans-serif;
            font-size: 1.2em;
            padding: 10px;
            margin: 10px 5px;
            border-radius: 10px;
            border: 2px solid #ddd;
        }
        button {
            background-color: #4ecdc4;
            color: white;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        button.record-btn {
            background-color: #ff6b6b;
            font-size: 1.5em;
            padding: 15px 30px;
            border-radius: 30px;
            margin-top: 20px;
        }
        
        .target-text {
            font-size: 2em;
            color: #2c3e50;
            background-color: #fff9c4;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            border: 2px dashed #ffeb3b;
        }
        
        #timerDisplay { font-size: 1.5em; color: #e74c3c; margin: 10px 0; }
        .feedback { font-size: 1.5em; margin-top: 20px; color: #2980b9; }
        
        .leaderboard-list {
            list-style: none;
            padding: 0;
            text-align: left;
        }
        .leaderboard-list li {
            background-color: #f1f2f6;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 화면 1: 로그인 -->
    <div id="loginScreen" class="screen active">
        <h1>의초등학교<br>영어 읽기 챌린지 🎤</h1>
        <div style="display: flex; flex-wrap: wrap; justify-content: center;">
            <select id="grade"><option value="">학년</option><option value="3">3학년</option><option value="4">4학년</option><option value="5">5학년</option><option value="6">6학년</option></select>
            <select id="classNum"><option value="">반</option><option value="1">1반</option><option value="2">2반</option><option value="3">3반</option></select>
            <input type="number" id="studentNum" placeholder="번호" style="width: 80px;">
            <input type="text" id="studentName" placeholder="이름" style="width: 120px;">
        </div>
        <button onclick="login()">입장하기</button>
    </div>

    <!-- 화면 2: 단원 선택 로비 -->
    <div id="lobbyScreen" class="screen">
        <h1 id="welcomeMsg">환영합니다!</h1>
        <h2>학습할 단원을 선택하세요</h2>
        <select id="unitSelect">
            <option value="Unit 1">Unit 1. Hello, World!</option>
            <option value="Unit 2">Unit 2. My Favorite Food</option>
            <option value="Unit 3">Unit 3. Where is the museum?</option>
        </select>
        <br><br>
        <button onclick="startPractice()">연습 시작하기</button>
        <button onclick="showLeaderboard()" style="background-color: #feca57;">🏆 명예의 전당</button>
    </div>

    <!-- 화면 3: 읽기 연습 방 -->
    <div id="practiceScreen" class="screen">
        <h2 id="currentUnitTitle">Unit 1</h2>
        <div class="target-text" id="targetSentence">I like apples and bananas.</div>
        <div id="timerDisplay">준비!</div>
        
        <button id="recordBtn" class="record-btn" onclick="toggleRecording()">🎙️ 마이크 켜기</button>
        
        <div class="feedback" id="feedbackArea"></div>
        <button onclick="showScreen('lobbyScreen')" style="margin-top:20px;">로비로 돌아가기</button>
    </div>

    <!-- 화면 4: 명예의 전당 -->
    <div id="leaderboardScreen" class="screen">
        <h1>🏆 명예의 전당 🏆</h1>
        <div style="margin-bottom: 20px;">
            <button onclick="loadLeaderboard('Unit 1')">Unit 1</button>
            <button onclick="loadLeaderboard('Unit 2')">Unit 2</button>
        </div>
        <ul class="leaderboard-list" id="leaderboardList">
            <!-- 랭킹 데이터가 여기에 추가됩니다 -->
        </ul>
        <button onclick="showScreen('lobbyScreen')">로비로 돌아가기</button>
    </div>
</div>

<script>
    // --- 전역 변수 ---
    let userInfo = {};
    let isRecording = false;
    let recognition;
    let startTime;
    let timerInterval;

    // --- 화면 전환 함수 ---
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // --- 1. 로그인 로직 ---
    function login() {
        const grade = document.getElementById('grade').value;
        const classNum = document.getElementById('classNum').value;
        const studentNum = document.getElementById('studentNum').value;
        const studentName = document.getElementById('studentName').value;

        if(!grade || !classNum || !studentNum || !studentName) {
            alert('정보를 모두 입력해주세요!');
            return;
        }

        userInfo = { grade, classNum, studentNum, studentName };
        document.getElementById('welcomeMsg').innerText = `${grade}학년 ${classNum}반 ${studentName} 친구, 환영해요!`;
        showScreen('lobbyScreen');
    }

    // --- 2. 연습 방 로직 ---
    function startPractice() {
        const unit = document.getElementById('unitSelect').value;
        document.getElementById('currentUnitTitle').innerText = unit;
        
        // 실제로는 단원별 문장 배열에서 랜덤으로 가져오거나 순차적으로 가져옵니다.
        const sentences = {
            "Unit 1": "Hello nice to meet you.",
            "Unit 2": "My favorite food is delicious pizza.",
            "Unit 3": "Excuse me where is the museum?"
        };
        document.getElementById('targetSentence').innerText = sentences[unit];
        document.getElementById('feedbackArea').innerHTML = '';
        document.getElementById('timerDisplay').innerText = '준비!';
        showScreen('practiceScreen');
    }

    // --- 3. 음성 인식 및 정확도/속도 계산 (핵심 알고리즘) ---
    function initSpeechRecognition() {
        window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!window.SpeechRecognition) {
            alert("이 브라우저는 음성 인식을 지원하지 않습니다. Chrome을 사용해주세요.");
            return null;
        }
        const rc = new SpeechRecognition();
        rc.lang = 'en-US';
        rc.interimResults = false;
        rc.maxAlternatives = 1;
        return rc;
    }

    function toggleRecording() {
        if(isRecording) return; // 이미 녹음중이면 무시
        
        recognition = initSpeechRecognition();
        if(!recognition) return;

        const targetText = document.getElementById('targetSentence').innerText;
        
        recognition.onstart = function() {
            isRecording = true;
            document.getElementById('recordBtn').innerText = "🛑 듣고 있어요...";
            document.getElementById('recordBtn').style.backgroundColor = "#e74c3c";
            
            // 타이머 시작
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                document.getElementById('timerDisplay').innerText = `⏱️ ${elapsed}초`;
            }, 100);
        };

        recognition.onspeechend = function() {
            recognition.stop();
        };

        recognition.onresult = function(event) {
            clearInterval(timerInterval);
            isRecording = false;
            document.getElementById('recordBtn').innerText = "🎙️ 마이크 켜기";
            document.getElementById('recordBtn').style.backgroundColor = "#ff6b6b";

            const recognizedText = event.results[0][0].transcript;
            const timeTaken = (Date.now() - startTime) / 1000;
            
            calculateAndShowResult(targetText, recognizedText, timeTaken);
        };

        recognition.onerror = function(event) {
            clearInterval(timerInterval);
            isRecording = false;
            document.getElementById('recordBtn').innerText = "🎙️ 다시 시도";
            document.getElementById('recordBtn').style.backgroundColor = "#ff6b6b";
            document.getElementById('feedbackArea').innerHTML = '마이크 오류가 발생했어요. 다시 눌러주세요!';
        };

        recognition.start();
    }

    // 레벤슈타인 거리 알고리즘 (문자열 유사도)
    function getLevenshteinDistance(a, b) {
        const matrix = [];
        for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
        for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
        for (let i = 1; i <= b.length; i++) {
            for (let j = 1; j <= a.length; j++) {
                if (b.charAt(i - 1) == a.charAt(j - 1)) {
                    matrix[i][j] = matrix[i - 1][j - 1];
                } else {
                    matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
                }
            }
        }
        return matrix[b.length][a.length];
    }

    function calculateAndShowResult(target, recognized, timeTaken) {
        // 소문자로 변환하고 특수문자 제거하여 순수 텍스트 비교
        const cleanTarget = target.toLowerCase().replace(/[.,!?]/g, "");
        const cleanRecognized = recognized.toLowerCase().replace(/[.,!?]/g, "");

        const distance = getLevenshteinDistance(cleanTarget, cleanRecognized);
        const maxLength = Math.max(cleanTarget.length, cleanRecognized.length);
        
        // 정확도(%) 계산
        let accuracy = ((maxLength - distance) / maxLength) * 100;
        accuracy = Math.max(0, Math.round(accuracy));

        // 단어 수 기반 목표 시간 계산 (단어당 0.8초 기준)
        const wordCount = cleanTarget.split(" ").length;
        const targetTime = wordCount * 0.8; 

        let feedbackHTML = `<p>인식된 문장: "${recognized}"</p>`;
        let finalScore = 0;

        if(accuracy < 80) {
            feedbackHTML += `<p style="color: #e74c3c;">정확도: ${accuracy}% 😭<br>아쉽네요! 발음에 조금 더 신경 써서 다시 연습해 볼까요?</p>`;
        } else {
            // 80% 이상일 때 포인트 계산
            let baseScore = accuracy; // 정확도 비례 기본 점수
            let speedBonus = 0;
            
            // 목표 시간보다 빨리 읽었을 경우 보너스 (남은 시간 1초당 5점)
            if(timeTaken < targetTime) {
                speedBonus = Math.round((targetTime - timeTaken) * 5);
            }
            
            finalScore = baseScore + speedBonus;
            
            feedbackHTML += `
                <p style="color: #27ae60;">정확도: ${accuracy}% 🎉 참 잘했어요!</p>
                <p>소요 시간: ${timeTaken.toFixed(1)}초 (목표: ${targetTime.toFixed(1)}초)</p>
                <p>기본 점수: ${baseScore}점 + 속도 보너스: ${speedBonus}점</p>
                <h3>획득한 총 포인트: ${finalScore}점!</h3>
            `;
            
            // TODO: Firebase 모듈 연동 후 데이터 저장 함수 호출
            // saveScoreToFirebase(finalScore, accuracy);
        }

        document.getElementById('feedbackArea').innerHTML = feedbackHTML;
    }

    // --- 4. 명예의 전당 (Firebase 연동 예시) ---
    function showLeaderboard() {
        showScreen('leaderboardScreen');
        loadLeaderboard('Unit 1'); // 기본값 로드

                <li><span>2위 🥈 5학년 1반 김철수</span> <span>115점</span></li>
                <li><span>3위 🥉 5학년 2반 이영희</span> <span>105점</span></li>
            `;
        }, 500);

            rank++;
        });
        */
    }
</script>
